name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    strategy:
      matrix:
        python-version: ["3.9", "3.11"]
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Unit tests
        run: python -m unittest discover -s scripts -p 'test_*.py' -v
      - name: Rule repository validation
        run: python scripts/validate_rule_repository.py
      - name: Syntax and whitespace checks
        run: |
          python -m py_compile scripts/*.py
          git diff --check
      - name: Repository safety checks
        run: |
          if grep -R -n -E --exclude-dir=.git -- '-----BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY-----' .; then
            echo 'Private-key PEM block found.' >&2
            exit 1
          fi
